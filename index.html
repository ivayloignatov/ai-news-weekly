<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Weekly</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,900&family=Hanken+Grotesk:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#fbfbfc;--panel:#ffffff;--ink:#15171d;--dim:#5a6070;--faint:#9aa0ad;--rule:#e7e9ef;
  --fd:"Fraunces",Georgia,serif;--fb:"Hanken Grotesk",system-ui,sans-serif;--fm:"JetBrains Mono",monospace;}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:var(--fb);font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
.wrap{max-width:880px;margin:0 auto;padding:0 30px}
.mast{display:flex;align-items:center;gap:11px;padding:30px 0 20px}
.brand{font-family:var(--fd);font-size:28px;font-weight:900;letter-spacing:-.02em;line-height:1;display:flex;align-items:center;gap:11px}
.brand .dot{width:9px;height:9px;border-radius:50%;background:#b5512f}
.divider{border:none;border-top:1px solid var(--rule);margin:0}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 30px}
.msg p{font-family:var(--fm);font-size:13px;color:var(--faint);letter-spacing:.04em;text-align:center}
</style>
</head>
<body>
<header class="wrap mast"><div class="brand"><span class="dot"></span>AI Weekly</div></header>
<hr class="divider">
<main>
  <div class="msg"><p>Nächste Ausgabe folgt Montag.</p></div>
</main>
</body>
</html>
