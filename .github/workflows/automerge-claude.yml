name: Auto-merge claude branches to main
# Jeder Push auf claude/** wird automatisch in main gemergt, damit Coolify deployt.
# Wenn der Merge index.html aendert, wird zusaetzlich der Newsletter-Workflow
# explizit getriggert (gh workflow run). Grund: ein Push mit GITHUB_TOKEN loest
# per GitHub-Design KEINE on:push-Workflows aus (Loop-Schutz) — sonst liefe der
# Newsletter bei Routine-Laeufen (claude/** -> auto-merge -> main) nie.
# workflow_dispatch umgeht diesen Loop-Schutz und laeuft wirklich.
on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  actions: write

jobs:
  merge:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Merge pushed claude branch into main
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Merging $BRANCH -> main"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$BRANCH"
          BEFORE="$(git rev-parse HEAD)"
          # Fast-forward wenn moeglich, sonst echter Merge-Commit
          git merge --ff-only "origin/$BRANCH" || git merge --no-edit "origin/$BRANCH"
          MERGED="$(git rev-parse HEAD)"
          # index.html durch diesen Merge geaendert? (Flag fuer Newsletter unten)
          if git diff --name-only "$BEFORE" "$MERGED" | grep -qx 'index.html'; then
            INDEX_CHANGED=1
          else
            INDEX_CHANGED=0
          fi
          # data.json deterministisch aus index.html ableiten (Consumer lesen JSON,
          # nicht HTML). Idempotent: nur committen wenn sich data.json aendert.
          node scripts/html-to-data.mjs
          if ! git diff --quiet -- data.json; then
            git add data.json
            git commit -m "chore(data): regenerate data.json from index.html"
            echo "data.json regeneriert + committet."
          else
            echo "data.json unveraendert."
          fi
          git push origin main
          AFTER="$(git rev-parse HEAD)"
          echo "main aktualisiert ($BEFORE -> $AFTER)."
          # Newsletter NUR bei echter index.html-Aenderung explizit triggern.
          if [ "$INDEX_CHANGED" = "1" ]; then
            echo "index.html geaendert -> Newsletter-Workflow triggern (workflow_dispatch)"
            gh workflow run newsletter.yml --ref main
          else
            echo "index.html unveraendert -> kein Newsletter"
          fi
